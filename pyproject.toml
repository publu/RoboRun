[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "roborun"
version = "0.8.0"
description = "Agentic robot OS — skills, fleet, vision AI, and MCP for any ROS robot"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [{name = "Pablo", email = "pablo@hashingsystems.com"}]
keywords = ["robotics", "ros", "mcp", "agent", "fleet", "yolo", "skills"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Homepage = "https://github.com/hashingsystems/roborun"
Repository = "https://github.com/hashingsystems/roborun"

dependencies = [
    "websocket-client>=1.6",
    "websockets>=12.0",
]

[project.optional-dependencies]
vision = [
    "ultralytics>=8.0",
    "opencv-python>=4.8",
    "numpy>=1.24",
    "Pillow>=10.0",
    "torch>=2.0",
    "torchvision>=0.15",
    "open-clip-torch>=2.20",
]
cosmos = ["cosmos-tokenizer>=0.1"]
depth = ["transformers>=4.30"]
jepa = ["timm>=0.9"]
dimos = ["dimos"]
gemini = ["google-generativeai>=0.8"]
zk = ["ezkl>=10.0", "onnx>=1.14"]
ros = ["ros_tap>=0.1", "cyclonedds>=0.10"]
all = ["roborun[vision,cosmos,depth,jepa,dimos,gemini,zk,ros]"]

[project.scripts]
roborun = "roborun.server:main"
roborun-mcp = "roborun.mcp_stdio:main"

[tool.setuptools.packages.find]
include = ["roborun*"]
