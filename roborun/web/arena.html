<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RoboRun Arena — Chamber 01</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; height: 100%; background: #0b0e11; overflow: hidden;
               font: 13px/1.4 ui-monospace, "SF Mono", Menlo, monospace; color: #d7e0e8; }
  #hud { position: fixed; top: 14px; left: 14px; z-index: 10; }
  #hud .brief { background: rgba(11,14,17,.82); border: 1px solid #1f2a33;
                border-radius: 8px; padding: 10px 14px; max-width: 380px; }
  #hud .brief b { color: #00d47e; letter-spacing: .08em; }
  #rooms { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
  .room-chip { border: 1px solid #2a3a46; border-radius: 4px; padding: 2px 8px;
               color: #6b7b88; }
  .room-chip.seen { border-color: #00d47e; color: #00d47e; }
  #status { position: fixed; top: 14px; right: 14px; z-index: 10; text-align: right;
            background: rgba(11,14,17,.82); border: 1px solid #1f2a33;
            border-radius: 8px; padding: 8px 12px; }
  #status .link.on { color: #00d47e; }
  #status .link.off { color: #e0a030; }
  #win { position: fixed; inset: 0; display: none; place-items: center; z-index: 20;
         background: rgba(5,8,10,.72); }
  #win.show { display: grid; }
  #win .card { border: 2px solid #00d47e; border-radius: 10px; padding: 28px 40px;
               background: #0b0e11; text-align: center; }
  #win .card h1 { color: #00d47e; margin: 0 0 8px; letter-spacing: .1em; }
  #keys { position: fixed; bottom: 14px; left: 14px; color: #4a5a66; z-index: 10; }
</style>
</head>
<body>
<div id="hud">
  <div class="brief">
    <b>CHAMBER 01 — RECON</b><br>
    Explore every room. Observe as you go — the timeline is taking notes,
    and there will be questions.
    <div id="rooms"></div>
  </div>
</div>
<div id="status">
  <div>⏱ <span id="clock">0.0s</span></div>
  <div class="link off" id="link">behaviors: searching…</div>
  <div id="cmdline">cmd —</div>
</div>
<div id="win"><div class="card">
  <h1>CHAMBER COMPLETE</h1>
  <div id="winDetail"></div>
  <div style="margin-top:10px;color:#6b7b88">the run is in the timeline — seal it from the deck (M)</div>
</div></div>
<div id="keys">WASD drive (or let a behavior do it) · deck at <a href="/" style="color:#3a8a6a">/</a></div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module" src="./arena.js"></script>
</body>
</html>
